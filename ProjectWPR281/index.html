<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bug Tracker - Data Foundation</title>
  <!-- This is to link the bootstrap css  -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  
</head>


<body>
  <!-- This is the navbar found at the top of the page -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Bug Tracker</a>
    <div class="navbar-nav">
      <a class="nav-link" href="/ProjectWPR281/index.html">Issues</a>
      <a class="nav-link" href="/ProjectWPR281/peopleAndProjects.html">People & Projects</a>
    </div>
  </div>
</nav>

  <!-- Here we create the new issue button -->
  <div class="container">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Issues</h2>
    <button class="btn btn-warning" data-bs-toggle="modal" data-bs-target="#modalCreateIssue">CREATE ISSUE</button>
  </div>

  <!-- Here we start the creation of the create issue modal -->
  <div class="modal fade" id="modalCreateIssue" tabindex="-1">
    <!-- Inside of this modal dialog div is where the modal content needs to go -->
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Create Issue</h5>
        </div>
        
        <div class="modal-body">
          <!-- Here we create the inputs for the modal -->
          <label class="form-label">Summary</label>
          <input id="createIssue_Summary" type="text" class="form-control">

          <label class="form-label">Description</label>
          <input id="createIssue_Description" type="text" class="form-control">

          <label class="form-label">Priority</label>
          <select id="createIssue_Priority" class="form-control">
              <option value="">-- Select Priority --</option>
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
          </select>

          <label class="form-label">Date Identified</label>
          <input id="createIssue_DateIdentified" type="date" class="form-control">

          <label class="form-label">Target Resolution Date</label>
          <input id="createIssue_TargetResolutionDate" type="date" class="form-control">

          <label class="form-label">Project</label>
          <select id="createIssue_Project" class="form-control">
              <option value="">-- Select Project --</option>
          </select>

          <label class="form-label">Identified By</label>
          <select id="createIssue_IdentifiedBy" class="form-control">
              <option value="">-- Select Person --</option>
          </select>

          <label class="form-label">Assigned To</label>
          <select id="createIssue_AssignedTo" class="form-control">
             <option value="">-- Select Person --</option>
         </select>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <button id="createNewIssue" type="button" class="btn btn-primary">Create Issue</button>
        </div>
      </div>
    </div>
  </div>


<!-- This is the layout of the table for all the listed bugs/issues/tickets -->
  <table id="bugTable" class="table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Summary</th>
        <th>Priority</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="bugTableBody">
      </tbody>
  </table>

</div>


  <!-- Thisi s the modal for viewing an existing issue -->
  <div class="modal fade" id="modalViewIssue" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">View Issue</h5>
        </div>
        <div class="modal-body">
          <!-- This is how the data displays when clicking on view -->
          <label class="form-label"><b>Summary</b></label>
          <label id="viewIssueSummary" class="form-label">SUMMARY GOES HERE</label> <br>

          <label class="form-label"><b>Description</b></label>
          <label id="viewIssueDescription" class="form-label">DESCRIPTION GOES HERE</label> <br>

          <label class="form-label"><b>Project</b></label>
          <label id="viewIssueProject" class="form-label">PROJECT GOES HERE</label> <br>
          
          <label class="form-label"><b>Assigned To</b></label>
          <label id="viewIssueAssigned" class="form-label">ASSIGNED GOES HERE</label> <br>

          <label class="form-label"><b>Priority</b></label>
          <label id="viewIssuePriority" class="form-label">PRIORITY GOES HERE</label> <br>

          <label class="form-label"><b>Status</b></label>
          <label id="viewIssueStatus" class="form-label">STATUS GOES HERE</label> <br>

          <label class="form-label"><b>Date Identified</b></label>
          <label id="viewIssueDateIdentified" class="form-label">IDENTIFIED GOES HERE</label> <br>

          <label class="form-label"><b>Target Resolution Date</b></label>
          <label id="viewIssueDateResolved" class="form-label">RESOLUTION GOES HERE</label> <br>

        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
      </div>
    </div>
  </div>

  <!-- This modal is for editing a existing modal -->
  <div class="modal fade" id="modalEditIssue" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Edit Issue</h5>
        </div>
        <div class="modal-body">
          <!-- Here we have the inputs to change the modal -->
          <label class="form-label">Summary</label>
          <input id="editSummary" type="text" class="form-control">
          <label class="form-label">Description</label>
          <input id="editDescription" type="text" class="form-control">
          <label class="form-label">Priority</label>
          <input id="editPriority" type="text" class="form-control">
          <label class="form-label">Status</label>
          <input id="editStatus" type="text" class="form-control">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <button id="confirmEditIssue" type="button" class="btn btn-primary">Update Issue</button>
      </div>
      </div>
    </div>
  </div>

  <!-- This is the modal for assignnig a person to an existing issue/ticket/bug -->
<div class="modal fade" id="modalAssignIssue" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Assign Issue</h5>
      </div>
      <div class="modal-body">
        <label class="form-label">Assign To</label>
        <select id="assignPersonSelect" class="form-control">
          <option value="">-- Select a Person --</option>
        </select>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button id="confirmAssignIssue" type="button" class="btn btn-primary">Assign Issue</button>
      </div>
    </div>
  </div>
</div>


  <!-- The script files are at the bottom of the page because for some reason when we move it to the head...nothing works ;D -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
  <script src="/JS/storage.js"></script>
  <script src="/JS/issues.js"></script>
  <script src="/JS/issuesFunctionality.js"></script>
</body>
</html>
