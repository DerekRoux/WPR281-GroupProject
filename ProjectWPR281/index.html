<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bug Tracker - Data Foundation</title>
</head>
<body>
  <h1>Bug Tracker Data Test</h1>
  <div id="output"></div>

  <table border="1" id="bugTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Summary</th>
        <th>Priority</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="bugTableBody">
      </tbody>
  </table>

  <script type="module">
    // 1. IMPORT: Bringing in your hard work from data.js
    import { people, projects, bugs } from './data.js';
    
    const outputDiv = document.getElementById('output');
    outputDiv.innerHTML = "<h2>Data Loaded Successfully!</h2>";

    // 2. PERSISTENCE: Saving the 10 bugs and team data to LocalStorage
    // This satisfies the "Data Persistence" requirement of the rubric.
    localStorage.setItem('teamMembers', JSON.stringify(people));
    localStorage.setItem('allProjects', JSON.stringify(projects));
    localStorage.setItem('bugList', JSON.stringify(bugs));

    console.log("Data & QA: Baseline data saved to LocalStorage.");

    // 3. RENDERING: Putting the data into the table
    const tableBody = document.getElementById('bugTableBody');
    
    // We clear it first to ensure a fresh start
    tableBody.innerHTML = '';

    // Loop through your 10 test bugs
    bugs.forEach(bug => {
      const row = document.createElement('tr');

      row.innerHTML = `
        <td>${bug.id}</td>
        <td>${bug.summary}</td>
        <td>${bug.priority}</td>
        <td>${bug.status}</td>
        <td><button disabled>Ready for Lead Dev</button></td>
      `;

      tableBody.appendChild(row);
    });
  </script>
</body>
</html>
