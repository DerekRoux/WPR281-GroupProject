<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bug Tracker - Data Foundation</title>
</head>
<body>
  <h1>Bug Tracker Data Test</h1>
  <div id="output"></div>

  <table border="1" id="bugTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Summary</th>
        <th>Priority</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="bugTableBody">
      </tbody>
  </table>

  <script src="./storage.js"></script>

  <script src="./issues.js"></script>

  <script type="module">
    import { people, projects, issues } from './data.js';

    window.people = people;
    window.projects = projects;
    window.issues = issues;
    
    let outputDiv = document.getElementById('output');
    outputDiv.innerHTML = "<h2>Data Loaded Successfully!</h2>";


    initStorage(people, projects, issues);

    console.log("Bug Tracker initialized. Current issues count:", window.issues.length);


    let tableBody = document.getElementById('bugTableBody');
    tableBody.innerHTML = '';

    issues.forEach(issue => {
      let row = document.createElement('tr');

      row.innerHTML = `
        <td>${issue.id}</td>
        <td>${issue.summary}</td>
        <td>${issue.priority}</td>
        <td>${issue.status}</td>
        <td><button disabled>Pending Logic</button></td>
      `;

      tableBody.appendChild(row);
    });
  </script>
</body>
</html>
